name: anvilkit-auth

services:
  pg:
    image: postgres:16
    container_name: anvilkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    networks:
      - internal

  redis:
    image: redis:7
    container_name: anvilkit-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    networks:
      - internal

  migrate:
    image: postgres:16
    container_name: anvilkit-postgres-migrate
    restart: "no"
    env_file:
      - .env
    depends_on:
      pg:
        condition: service_healthy
    volumes:
      - ${MIGRATIONS_DIR}:/migrations:ro
    networks:
      - internal
    entrypoint:
      - /bin/bash
      - -ec
      - |
        set -euo pipefail
        echo "Running DB migration..."
        ls -la /migrations
        for f in $$(find /migrations -maxdepth 2 -type f -name '*.sql' | sort); do
          echo "Applying migration: $$f"
          psql "$$DB_DSN" -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "DB migration completed."

  auth-api:
    image: ghcr.io/${IMAGE_OWNER}/anvilkit-auth-template-auth-api:${IMAGE_TAG}
    container_name: anvilkit-auth-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    mem_limit: 512m
    networks:
      - internal

  admin-api:
    image: ghcr.io/${IMAGE_OWNER}/anvilkit-auth-template-admin-api:${IMAGE_TAG}
    container_name: anvilkit-admin-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    mem_limit: 512m
    networks:
      - internal

  email-worker:
    image: ghcr.io/${IMAGE_OWNER}/anvilkit-auth-template-email-worker:${IMAGE_TAG}
    container_name: anvilkit-email-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    mem_limit: 512m
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: anvilkit-prometheus
    restart: unless-stopped
    depends_on:
      - email-worker
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheusdata:/prometheus
    mem_limit: 512m
    networks:
      - internal

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: anvilkit-alertmanager
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
      - sed -e "s|__ALERT_EMAIL_TO__|$${ALERT_EMAIL_TO}|g" -e "s|__ALERT_EMAIL_FROM__|$${ALERT_EMAIL_FROM}|g" -e "s|__ALERT_SMTP_SMARTHOST__|$${ALERT_SMTP_SMARTHOST}|g" -e "s|__ALERT_SMTP_AUTH_USERNAME__|$${ALERT_SMTP_AUTH_USERNAME}|g" -e "s|__ALERT_SMTP_AUTH_PASSWORD__|$${ALERT_SMTP_AUTH_PASSWORD}|g" -e "s|__ALERT_SMTP_REQUIRE_TLS__|$${ALERT_SMTP_REQUIRE_TLS}|g" /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml && exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    env_file:
      - .env
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - alertmanagerdata:/alertmanager
    mem_limit: 256m
    networks:
      - internal

  grafana:
    image: grafana/grafana:12.1.1
    container_name: anvilkit-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    mem_limit: 512m
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  alertmanagerdata:
  grafanadata:
