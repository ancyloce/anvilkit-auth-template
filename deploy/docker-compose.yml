services:
  pg:
    image: postgres:16
    container_name: anvilkit-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: anvilkit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: anvilkit-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    image: postgres:16
    container_name: anvilkit-postgres-migrate
    restart: "no"
    env_file:
      - ../.env
    depends_on:
      pg:
        condition: service_healthy
    volumes:
      - ../services/auth-api/migrations:/migrations/auth-api:ro
      - ../services/admin-api/migrations:/migrations/admin-api:ro
    entrypoint:
      - /bin/bash
      - -ec
      - |
        set -euo pipefail
        echo "Running DB migration..."
        ls -la /migrations
        for f in $$(find /migrations -maxdepth 2 -type f -name '*.sql' | sort); do
          echo "Applying migration: $$f"
          psql "$$DB_DSN" -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "DB migration completed."

  auth-api:
    build:
      context: ..
      dockerfile: services/auth-api/Dockerfile
    container_name: anvilkit-auth-api
    environment:
      DB_DSN: postgres://postgres:postgres@pg:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me
      ACCESS_TTL_MIN: "15"
      REFRESH_TTL_HOURS: "168"
      CORS_ALLOW_ORIGINS: http://localhost:3000
      CORS_ALLOW_CREDENTIALS: "false"
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  admin-api:
    build:
      context: ..
      dockerfile: services/admin-api/Dockerfile
    container_name: anvilkit-admin-api
    environment:
      DB_DSN: postgres://postgres:postgres@pg:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me
      ACCESS_TTL_MIN: "15"
      REFRESH_TTL_HOURS: "168"
      CORS_ALLOW_ORIGINS: http://localhost:3000
      CORS_ALLOW_CREDENTIALS: "false"
      RBAC_DIR: /app/internal/rbac
    depends_on:
      pg:
        condition: service_healthy
    ports:
      - "8081:8081"

  email-worker:
    build:
      context: ..
      dockerfile: services/email-worker/Dockerfile
    container_name: anvilkit-email-worker
    env_file:
      - ../.env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      EMAIL_WEBHOOK_ADDR: :8082
      EMAIL_WEBHOOK_SECRET: dev-email-webhook-secret
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
    ports:
      - "8082:8082"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: anvilkit-prometheus
    depends_on:
      - email-worker
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: anvilkit-alertmanager
    entrypoint:
      - /bin/sh
      - -ec
      - sh /etc/alertmanager/render-alertmanager-config.sh /tmp/alertmanager.yml && exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    environment:
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-alerts@example.com}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-alerts@anvilkit.local}
      ALERT_SMTP_SMARTHOST: ${ALERT_SMTP_SMARTHOST:-mailpit:1025}
      ALERT_SMTP_AUTH_USERNAME: ${ALERT_SMTP_AUTH_USERNAME:-}
      ALERT_SMTP_AUTH_PASSWORD: ${ALERT_SMTP_AUTH_PASSWORD:-}
      ALERT_SMTP_REQUIRE_TLS: ${ALERT_SMTP_REQUIRE_TLS:-false}
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/render-alertmanager-config.sh:/etc/alertmanager/render-alertmanager-config.sh:ro

  grafana:
    image: grafana/grafana:12.1.1
    container_name: anvilkit-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
